context:
  name: box2d
  version: "3.1.1"
  build_number: 1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/erincatto/box2d/archive/refs/tags/v${{ version }}.tar.gz
  sha256: fb6ef914b50f4312d7d921a600eabc12318bb3c55a0b8c0b90608fa4488ef2e4

build:
  number: ${{ build_number }}
  script:
    env:
      BOX2D_AVX2: ${{ "ON" if microarch_level|default(1)|int >= 3 and target_platform == "linux-64" else "OFF" }}
  variant:
    use_keys:
      - microarch_level
    down_prioritize_variant: ${{ 1 if microarch_level|default(1)|int < 3 and target_platform == "linux-64" else 0 }}

requirements:
  build:
    - if: linux and x86_64
      then: x86_64-microarch-level ==${{ microarch_level }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
  run_exports:
    - ${{ pin_subpackage(name, upper_bound="x.x") }}

tests:
  - package_contents:
      lib:
        - box2d
      include:
        - box2d/base.h
        - box2d/box2d.h
        - box2d/collision.h
        - box2d/id.h
        - box2d/math_functions.h
        - box2d/types.h

about:
  homepage: https://box2d.org/
  summary: "Box2D is a 2D physics engine for games."
  description: |
    An open source C engine for simulating rigid bodies in 2D, uses the C17 standard.
  license: MIT
  license_file: LICENSE
  documentation: https://box2d.org/documentation/
  repository: https://github.com/erincatto/box2d

extra:
  recipe-maintainers:
    - tdejager
    - baszalmstra
